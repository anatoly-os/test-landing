# pay-bot routing for osokin.ai
# Installed to /etc/nginx/snippets/pay-bot.conf and included inside the
# existing server block (right after its `root /var/www/osokin.ai;`).
#
# Only the API path goes to Node; everything else under /mastering-ai/ stays
# static (served from the webroot). `^~` beats the generic static handling.

location = /mastering-ai/api/pay-lead {
    proxy_pass http://127.0.0.1:4332;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
