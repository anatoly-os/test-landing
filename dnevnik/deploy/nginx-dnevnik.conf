# /dnevnik routing for osokin.ai
# Installed to /etc/nginx/snippets/dnevnik.conf and included inside the
# existing server block (right after its `root /var/www/osokin.ai;`).
#
# Location precedence (nginx picks the longest ^~ prefix, exact `=` wins first):
#   = /dnevnik         -> Node (the wall, no trailing slash)
#   = /dnevnik/        -> Node (the wall)
#   ^~ /dnevnik/admin  -> Node (editor + login)
#   ^~ /dnevnik/api    -> Node (save / preview / toggle)
#   ^~ /dnevnik/       -> static post pages from the webroot (generated on save)

location = /dnevnik {
    proxy_pass http://127.0.0.1:4321;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /dnevnik/ {
    proxy_pass http://127.0.0.1:4321;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /dnevnik/admin {
    proxy_pass http://127.0.0.1:4321;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /dnevnik/api {
    proxy_pass http://127.0.0.1:4321;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /dnevnik/ {
    try_files $uri $uri/ =404;
}
