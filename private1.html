<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свидание · 28 июня 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1714;
    --ink-soft: #5a5550;
    --ink-muted: #9a9490;
    --paper: #f7f4ef;
    --paper-warm: #ede9e2;
    --line: #d8d2c8;
    --accent: #8B6F47;
    --accent-soft: #c4a882;
  }

  html { font-size: 16px; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  /* ───────────────── GATE (countdown) ───────────────── */
  .gate {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 3rem 1.5rem;
  }

  .gate .eyebrow {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 1.6rem;
  }

  .gate h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    font-weight: 300;
    line-height: 1.18;
    letter-spacing: -0.01em;
    max-width: 16ch;
  }

  .gate h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .place {
    margin-top: 1.4rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.15rem, 3.2vw, 1.5rem);
    font-style: italic;
    color: var(--ink-soft);
  }

  .when {
    margin-top: 0.5rem;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .rule {
    width: 48px;
    height: 1px;
    background: var(--line);
    margin: 2.6rem auto;
  }

  .countdown {
    display: flex;
    gap: clamp(1rem, 5vw, 2.6rem);
    justify-content: center;
  }

  .cd-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 56px;
  }

  .cd-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 9vw, 4rem);
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .cd-label {
    margin-top: 0.7rem;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .gate .hint {
    margin-top: 3rem;
    font-size: 11px;
    font-style: italic;
    color: var(--ink-muted);
  }

  /* ───────────────── REVEAL (letter) ───────────────── */
  .reveal { display: none; }
  body.unlocked .gate { display: none; }
  body.unlocked .reveal { display: block; }

  iframe.letter {
    display: block;
    width: 100%;
    border: 0;
    min-height: 100vh;
    background: var(--paper);
  }
</style>
</head>
<body>

  <!-- ───── GATE ───── -->
  <section class="gate" id="gate">
    <p class="eyebrow">До встречи</p>
    <h1>Скоро увидимся<br><em>на свидании</em></h1>
    <p class="place">Ресторан AVA в ДЕПО</p>
    <p class="when">28 июня 2026 · 15:00</p>

    <div class="rule"></div>

    <div class="countdown" id="countdown" aria-live="polite">
      <div class="cd-cell"><span class="cd-num" id="cd-days">00</span><span class="cd-label">дней</span></div>
      <div class="cd-cell"><span class="cd-num" id="cd-hours">00</span><span class="cd-label">часов</span></div>
      <div class="cd-cell"><span class="cd-num" id="cd-mins">00</span><span class="cd-label">минут</span></div>
      <div class="cd-cell"><span class="cd-num" id="cd-secs">00</span><span class="cd-label">секунд</span></div>
    </div>

    <p class="hint">Откроется ровно в момент встречи</p>
  </section>

  <!-- ───── REVEAL ───── -->
  <section class="reveal" id="reveal">
    <iframe class="letter" id="frame" src="private1-letter.html" title="Письмо себе через год"></iframe>
  </section>

<script>
  // Момент свидания: 28 июня 2026, 15:00 по UTC+3.
  var TARGET = new Date('2026-06-28T15:00:00+03:00').getTime();

  var pad = function (n) { return String(n).padStart(2, '0'); };

  function unlock() {
    if (document.body.classList.contains('unlocked')) return;
    document.body.classList.add('unlocked');
    syncFrameHeight();
  }

  function tick() {
    var diff = TARGET - Date.now();
    if (diff <= 0) { unlock(); return; }
    var s = Math.floor(diff / 1000);
    var d = Math.floor(s / 86400); s -= d * 86400;
    var h = Math.floor(s / 3600);  s -= h * 3600;
    var m = Math.floor(s / 60);    s -= m * 60;
    document.getElementById('cd-days').textContent  = pad(d);
    document.getElementById('cd-hours').textContent = pad(h);
    document.getElementById('cd-mins').textContent  = pad(m);
    document.getElementById('cd-secs').textContent  = pad(s);
  }

  tick();
  setInterval(tick, 1000);

  /* auto-resize the same-origin iframe to its content */
  function syncFrameHeight() {
    var f = document.getElementById('frame');
    try {
      var doc = f.contentWindow.document;
      var hgt = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
      if (hgt) f.style.height = hgt + 'px';
    } catch (e) {}
  }

  window.addEventListener('resize', syncFrameHeight);
  setInterval(syncFrameHeight, 600);
</script>
</body>
</html>
